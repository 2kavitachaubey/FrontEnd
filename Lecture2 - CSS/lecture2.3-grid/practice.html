<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AICREA</title>
    <link rel="stylesheet" href="practice.css" />
  </head>

  <body>

    <!-- HEADER -->
    <header class="navbar">

      <div class="logo">
        <h2>AICREA</h2>
      </div>

      <nav>
        <ul class="nav-links">
          <li><a href="#">Features</a></li>
          <li><a href="#">Pricing</a></li>
          <li><a href="#">Enterprise</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Community</a></li>
        </ul>
      </nav>

      <div class="nav-buttons">
        <button class="login-btn">Log In</button>
        <button class="talk-btn">Let's Talk</button>
      </div>

    </header>

    <!-- HERO SECTION -->
    <section class="hero">

      <!-- LEFT CONTENT -->
      <div class="hero-content">

        <span class="tagline">
          AI Powered Creative Solutions
        </span>

        <h1>
          Advancing Creativity With Artificial Intelligence
        </h1>

        <p>
          Transform your ideas into intelligent digital experiences using
          next-generation AI tools and creative automation.
        </p>

        <div class="hero-buttons">
          <button class="primary-btn">Contact Us</button>
          <button class="secondary-btn">Request a Call</button>
        </div>

        <div class="brand-list">
          <span>Tide</span>
          <span>Coinbase</span>
          <span>Notion</span>
          <span>Spotify</span>
        </div>

      </div>

      <!-- RIGHT IMAGES -->
      <div class="hero-images">

        <div class="image-card img1">
          <img src="./1.jpg" alt="AI Visual" />
        </div>

        <div class="image-card img2">
          <img src="./2.jpg" alt="Creative AI" />
        </div>

        <div class="image-card img3">
          <img src="./2.jpg" alt="Technology" />
        </div>

      </div>

    </section>

  </body>
</html>
